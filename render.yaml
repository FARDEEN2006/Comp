services:
  - type: web
    name: secondhand-marketplace-backend
    runtime: java
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/secondhand-marketplace-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false

  - type: static
    name: secondhand-marketplace-frontend
    rootDir: .
    buildCommand: ""
    staticPublishPath: .
