<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Account • Second-Hand Component Marketplace</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js?v=5" defer></script>
</head>
<body>
  <header class="navbar">
    <div class="navbar-inner">
      <a class="brand" href="login.html">
        <span class="brand-badge" aria-hidden="true"></span>
        <span>Second-Hand Component Marketplace</span>
      </a>
      <nav class="nav-links" aria-label="Primary">
        <a class="nav-link" href="login.html">Login</a>
        <a class="nav-link active" href="register.html">Create Account</a>
      </nav>
    </div>
  </header>

  <main class="auth-wrap">
    <section class="card auth-card" aria-label="Register form">
      <div class="card-body">
        <h1 class="page-title">Create your account</h1>
        <p class="page-subtitle">Start listing and finding affordable components.</p>

        <form id="registerForm" class="form" novalidate>
          <div class="form-row two">
            <div class="field">
              <label class="label" for="name">Full Name</label>
              <input class="input" id="name" name="name" type="text" placeholder="Your name" required />
            </div>
            <div class="field">
              <label class="label" for="phone">Phone Number</label>
              <input class="input" id="phone" name="phone" type="tel" placeholder="e.g., +919876543210" required />
            </div>
          </div>

          <div class="field">
            <label class="label" for="regEmail">Email</label>
            <input class="input" id="regEmail" name="email" type="email" placeholder="you@example.com" required />
          </div>

          <div class="field">
            <label class="label" for="regPassword">Password</label>
            <div class="input-group">
              <input class="input" id="regPassword" name="password" type="password" placeholder="Create a password" required />
              <button class="btn toggle-password" type="button" data-target="regPassword">Show</button>
            </div>
          </div>

          <div class="error" role="alert"></div>

          <button class="btn btn-primary" type="submit">Register</button>

          <p class="help">Already have an account? <a class="link" href="login.html">Login</a></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="container footer">© Second-Hand Component Marketplace (Frontend demo)</footer>
</body>
</html>
